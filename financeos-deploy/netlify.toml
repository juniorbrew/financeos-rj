[build]
  publish = "public"
  functions = "netlify/functions"
[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "STRIPE_WEBHOOK_SECRET,SUPABASE_URL"
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

SECRETS_SCAN_OMIT_KEYS = "STRIPE_WEBHOOK_SECRET,SUPABASE_URL"