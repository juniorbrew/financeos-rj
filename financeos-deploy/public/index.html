<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark"><!-- build:20260305-020333 -->
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>

  <title>FinanceOS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23f0b429'/><text x='16' y='22' text-anchor='middle' font-size='18' font-family='serif' fill='%23000'>F</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script>try{var t=localStorage.getItem("fos-theme")||"dark";document.documentElement.setAttribute("data-theme",t);}catch{}</script>
  <style id="app-css">
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  /* Font aliases — swap here to change the whole app */
  :root {
    --font-display: 'Fraunces', Georgia, serif;
    --font-body:    'Sora', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;

    /* Type scale */
    --text-xs:   11px;
    --text-sm:   12px;
    --text-base: 13px;
    --text-md:   15px;
    --text-lg:   18px;
    --text-xl:   22px;
    --text-2xl:  28px;
    --text-3xl:  36px;

    /* Letter spacing */
    --ls-tight:  -0.02em;
    --ls-normal:  0;
    --ls-wide:    0.04em;
    --ls-wider:   0.08em;
    --ls-widest:  0.14em;

    /* Line heights */
    --lh-tight:  1.2;
    --lh-snug:   1.4;
    --lh-normal: 1.6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --surface2:  #18181f;
    --border:    #1e1e2a;
    --border2:   #2a2a38;
    --gold:      #f0b429;
    --gold-dim:  #f0b42922;
    --green:     #34d399;
    --green-dim: #34d39918;
    --red:       #f87171;
    --red-dim:   #f8717118;
    --blue:      #60a5fa;
    --blue-dim:  #60a5fa18;
    --purple:    #a78bfa;
    --purple-dim:#a78bfa18;
    --text:      #e8e8f0;
    --text2:     #8888a0;
    --text3:     #44445a;
    --radius:    12px;
    --shadow:    0 4px 24px rgba(0,0,0,0.5);
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: var(--text-base); line-height: var(--lh-normal); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .app { display: flex; height: 100dvh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 220px; min-width: 220px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex;
    flex-direction: column; transition: width 0.25s; overflow: hidden;
  }
  .sidebar.collapsed { width: 60px; min-width: 60px; }
  .sidebar-logo {
    padding: 20px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .logo-mark {
    width: 32px; height: 32px; background: var(--gold);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; color: #000;
  }
  .logo-text { font-family: var(--font-display); font-size: 19px; font-weight: 500; letter-spacing: var(--ls-tight); white-space: nowrap; }
  .logo-sub { font-size: 10px; color: var(--text2); white-space: nowrap; margin-top: 1px; }
  .nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px;
    border-radius: 8px; cursor: pointer; color: var(--text2);
    font-size: var(--text-base); font-weight: 500; border: none; background: none;
    width: 100%; text-align: left; transition: all 0.15s; white-space: nowrap;
    font-family: var(--font-body); letter-spacing: 0.005em;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--gold-dim); color: var(--gold); }
  .nav-dot { width: 6px; height: 6px; border-radius: 99px; background: currentColor; flex-shrink: 0; display: none; }
  .sidebar.collapsed .nav-dot { display: block; }
  .nav-sep { height: 1px; background: var(--border); margin: 8px 0; }
  .sidebar-bottom { padding: 12px 8px; border-top: 1px solid var(--border); }
  .user-pill {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: 8px; white-space: nowrap;
  }
  .avatar {
    width: 28px; height: 28px; border-radius: 99px; background: var(--gold);
    color: #000; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); flex-shrink: 0;
  }
  .topbar-title { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: var(--ls-tight); line-height: var(--lh-tight); }
  .topbar-sub { font-size: var(--text-sm); color: var(--text2); margin-top: 2px; letter-spacing: 0.01em; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .card-title { font-family: var(--font-display); font-size: 16px; font-weight: 400; letter-spacing: var(--ls-tight); color: var(--text); margin-bottom: 16px; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden;
  }
  .kpi::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .kpi.gold::before { background: var(--gold); }
  .kpi.green::before { background: var(--green); }
  .kpi.red::before { background: var(--red); }
  .kpi.blue::before { background: var(--blue); }
  .kpi.purple::before { background: var(--purple); }
  .kpi-label { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: var(--ls-widest); margin-bottom: 10px; }
  .kpi-value { font-family: var(--font-mono); font-size: 19px; font-weight: 600; letter-spacing: var(--ls-tight); }
  .kpi-value.gold { color: var(--gold); }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.blue { color: var(--blue); }
  .kpi-value.purple { color: var(--purple); }
  .kpi-delta { font-size: 11px; margin-top: 6px; color: var(--text2); }
  .kpi-icon { position: absolute; bottom: 14px; right: 14px; opacity: 0.15; }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-65-35 { display: grid; grid-template-columns: 1.8fr 1fr; gap: 14px; }
  .grid-35-65 { display: grid; grid-template-columns: 1fr 1.8fr; gap: 14px; }
  .auto-grid-260 { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .auto-grid-280 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .auto-grid-320 { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  /* BAR CHART */
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
  .bar-fill { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); min-height: 2px; }
  .bar-label { font-size: 9px; color: var(--text3); font-family: var(--font-mono); letter-spacing: var(--ls-wide); }

  /* LINE SPARKLINE */
  .sparkline { overflow: visible; }

  /* DONUT */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .legend-dot { width: 8px; height: 8px; border-radius: 99px; flex-shrink: 0; }
  .legend-name { font-size: 12px; color: var(--text2); }
  .legend-val { font-size: 12px; font-family: var(--font-mono); color: var(--text); margin-left: auto; }

  /* TABLE */
  .table-wrap { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 11px 16px; text-align: left; font-size: 10px; font-weight: 700; color: var(--text2); background: var(--surface2); text-transform: uppercase; letter-spacing: var(--ls-widest); white-space: nowrap; }
  tbody tr { border-top: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 12px 16px; font-size: 13px; }

  /* BADGE */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; letter-spacing: var(--ls-wide); white-space: nowrap; text-transform: uppercase; }
  .badge-gold { background: var(--gold-dim); color: var(--gold); }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }
  .badge-purple { background: var(--purple-dim); color: var(--purple); }
  .badge-gray { background: #1e1e2a; color: var(--text2); }

  /* AMOUNT */
  .amt-pos { font-family: var(--font-mono); color: var(--green); font-weight: 600; letter-spacing: var(--ls-tight); }
  .amt-neg { font-family: var(--font-mono); color: var(--red); font-weight: 600; letter-spacing: var(--ls-tight); }
  .amt-neu { font-family: var(--font-mono); color: var(--blue); font-weight: 600; letter-spacing: var(--ls-tight); }
  .amt-def { font-family: var(--font-mono); color: var(--text); }

  /* PROGRESS */
  .progress-track { height: 6px; background: var(--border2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
    border-radius: 8px; font-size: var(--text-base); font-weight: 600; cursor: pointer;
    border: none; font-family: var(--font-body); letter-spacing: 0.01em; transition: all 0.15s; white-space: nowrap;
  }
  .btn-primary { background: var(--gold); color: #000; }
  .btn-primary:hover { background: #f5c842; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
  .btn-ghost:hover { border-color: var(--border2); background: var(--border); }
  .btn-danger { background: var(--red-dim); color: var(--red); }
  .btn-danger:hover { background: #f8717128; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 7px; border-radius: 7px; }

  /* INPUTS */
  input, select, textarea {
    width: 100%; padding: 9px 12px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 8px; color: var(--text);
    font-size: var(--text-base); font-family: var(--font-body); outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  select { appearance: none; cursor: pointer; }
  label { display: block; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: var(--ls-widest); margin-bottom: 6px; }
  .field { margin-bottom: 14px; }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,0.7); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-family: var(--font-display); font-size: 21px; font-weight: 400; letter-spacing: var(--ls-tight); }
  .modal-body { padding: 24px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; }

  /* ALERT BANNER */
  .alert-bar { padding: 10px 24px; background: #1a1208; border-bottom: 1px solid #f0b42933; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gold); }

  /* SECTION HEADER */
  .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .section-title { font-family: var(--font-display); font-size: 26px; font-weight: 400; letter-spacing: var(--ls-tight); }

  /* CC CARD */
  .cc-card {
    border-radius: 14px; padding: 22px; color: #fff; position: relative;
    overflow: hidden; min-height: 160px;
  }
  .cc-card::after {
    content: ''; position: absolute; width: 160px; height: 160px;
    border-radius: 99px; background: rgba(255,255,255,0.05);
    top: -40px; right: -40px;
  }

  /* ACCOUNT CARD */
  .acc-card { border-radius: var(--radius); border: 1px solid var(--border); padding: 18px; background: var(--surface); }
  .acc-balance { font-family: var(--font-mono); font-size: 22px; font-weight: 600; letter-spacing: var(--ls-tight); margin: 8px 0; }

  /* METRIC ROW */
  .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .metric-row:last-child { border-bottom: none; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select { width: auto; flex: 1; min-width: 140px; }

  /* GOAL CARD */
  .goal-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; background: var(--surface); }

  /* TAB BAR */
  .tab-bar { display: flex; gap: 2px; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 20px; }
  .tab { padding: 7px 16px; border-radius: 8px; font-size: var(--text-base); font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text2); font-family: var(--font-body); letter-spacing: 0.005em; transition: all 0.15s; }
  .tab.active { background: var(--surface); color: var(--gold); box-shadow: 0 1px 6px rgba(0,0,0,0.4); }

  /* CASH FLOW CHART */
  .cf-legend { display: flex; gap: 16px; margin-bottom: 12px; }
  .cf-dot { width: 8px; height: 8px; border-radius: 99px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.4s ease both; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .pulse { animation: pulse 2s infinite; }

  /* ═══════════════════ RESPONSIVE ═══════════════════ */

  /* Tablet: colapsar sidebar */
  @media (max-width: 1024px) {
    .sidebar { width: 60px; min-width: 60px; }
    .sidebar .logo-text, .sidebar .logo-sub,
    .sidebar .nav-item span:not(.nav-dot),
    .sidebar .sidebar-bottom .user-pill > div:last-child { display: none; }
  }

  /* Mobile: esconder sidebar, mostrar bottom-nav */
  @media (max-width: 768px) {
    html { -webkit-text-size-adjust: 100%; }

    /* Layout */
    .app { flex-direction: column; overflow: hidden; height: 100dvh; }
    .main { flex: 1; min-height: 0; }
    .sidebar { display: none !important; }

    /* Topbar compacto */
    .topbar { padding: 10px 14px; gap: 8px; }
    .topbar-title { font-size: 15px; }
    .topbar-sub { display: none; }
    .topbar-right-desktop { display: none; }

    /* Content com padding para bottom-nav */
    .content { padding: 14px 14px 76px; }

    /* Bottom nav */
    .bottom-nav {
      display: flex !important;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 600;
      height: 60px; background: var(--surface);
      border-top: 1px solid var(--border);
      align-items: stretch;
    }
    .bn-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; border: none; background: none;
      cursor: pointer; color: var(--text2); font-size: 10px; font-weight: 600;
      font-family: var(--font-body); transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .bn-item.active { color: var(--gold); }
    .bn-fab-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .bn-fab {
      width: 52px; height: 52px; background: var(--gold); border-radius: 99px;
      display: flex; align-items: center; justify-content: center; color: #000;
      box-shadow: 0 4px 20px rgba(240,180,41,0.55);
      margin-bottom: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .bn-fab:active { transform: scale(0.9); box-shadow: 0 2px 10px rgba(240,180,41,0.3); }

    /* Drawer overlay */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 700;
      display: flex; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
    }
    .drawer-panel {
      width: 260px; max-width: 80vw; height: 100%;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      animation: drawerSlide 0.22s ease;
    }
    .drawer-dismiss { flex: 1; }

    /* Menu button */
    .menu-btn {
      display: flex !important; align-items: center; justify-content: center;
      padding: 7px; border-radius: 8px; border: none; background: none;
      color: var(--text); cursor: pointer; margin-right: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-btn:hover { background: var(--surface2); }

    /* Grids: 1 coluna */
    .grid-2, .grid-3, .grid-65-35, .grid-35-65 { grid-template-columns: 1fr !important; }
    .kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
    .auto-grid-260, .auto-grid-280, .auto-grid-320 { grid-template-columns: 1fr !important; }

    /* Cards compactos */
    .card { padding: 14px; }
    .card-title { font-size: 13px; }
    .kpi { padding: 12px; }
    .kpi-value { font-size: 17px; }
    .kpi-icon { display: none; }

    /* Tabelas: scroll horizontal */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 520px; }
    thead th, tbody td { padding: 8px 12px; font-size: 12px; }

    /* Modais: bottom sheet */
    .modal-bg { align-items: flex-end; padding: 0; }
    .modal {
      border-radius: 20px 20px 0 0;
      max-height: 92dvh;
      border-left: none; border-right: none; border-bottom: none;
    }
    .modal-header { padding: 14px 18px; }
    .modal-body { padding: 14px 18px 32px; }

    /* Formulários: 1 coluna — inline styles e classes */
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="grid-template-columns: 1fr 1fr 1fr"],
    [style*="gridTemplateColumns"],
    .grid-form { grid-template-columns: 1fr !important; }

    /* KPI bills (repeat 3) */
    [style*="repeat(3, 1fr)"] { grid-template-columns: 1fr 1fr !important; }

    /* Cards auto-fill com minmax grande */
    [style*="minmax(320px"] { grid-template-columns: 1fr !important; }
    [style*="minmax(280px"] { grid-template-columns: 1fr !important; }
    [style*="minmax(260px"] { grid-template-columns: 1fr !important; }

    /* Filter bar */
    .filter-bar { gap: 8px; flex-wrap: wrap; }
    .filter-bar input, .filter-bar select,
    .filter-bar input[style], .filter-bar select[style] {
      min-width: 0 !important; width: 100% !important; flex: 1 1 100%; box-sizing: border-box;
    }

    /* Section head */
    .section-head { gap: 10px; flex-wrap: wrap; }

    /* Donut */
    .donut-wrap { flex-direction: column; align-items: flex-start; }

    /* Alerts */
    .alert-bar { padding: 8px 14px; font-size: 11px; }

    /* Tab bar scroll */
    .tab-bar { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
    .tab { white-space: nowrap; font-size: 12px; padding: 6px 12px; }

    /* QE */
    .qe-fab-topbar { display: none !important; }
    .qe-toast { left: 12px; right: 12px; bottom: 68px; }
  }

  @media (max-width: 400px) {
    .kpi-value { font-size: 14px; }
    .kpi { padding: 10px; }
    .content { padding: 10px 10px 76px; }
    .topbar { padding: 8px 12px; }
  }

  @keyframes drawerSlide { from { transform: translateX(-100%); } to { transform: translateX(0); } }


  /* ═══════════════════ AUTH SCREEN ═══════════════════ */
  .auth-bg {
    min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); padding: 20px; position: relative; overflow: hidden;
  }
  .auth-bg::before {
    content: ''; position: absolute; width: 600px; height: 600px;
    background: radial-gradient(circle, #f0b42912 0%, transparent 70%);
    top: -200px; right: -200px; pointer-events: none;
  }
  .auth-bg::after {
    content: ''; position: absolute; width: 400px; height: 400px;
    background: radial-gradient(circle, #34d39908 0%, transparent 70%);
    bottom: -100px; left: -100px; pointer-events: none;
  }
  .auth-card {
    width: 100%; max-width: 420px; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 20px;
    padding: 40px 36px; position: relative; z-index: 1;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.5s ease both;
  }
  .auth-logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
  }
  .auth-logo-mark {
    width: 40px; height: 40px; background: var(--gold); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .auth-logo-text { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: var(--ls-tight); }
  .auth-logo-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .auth-title { font-family: var(--font-display); font-size: 34px; font-weight: 400; letter-spacing: var(--ls-tight); margin-bottom: 6px; line-height: var(--lh-tight); font-style: italic; }
  .auth-sub { font-size: var(--text-base); color: var(--text2); margin-bottom: 28px; line-height: var(--lh-normal); }
  .auth-input-wrap { position: relative; margin-bottom: 14px; }
  .auth-input-wrap input {
    width: 100%; padding: 12px 14px 12px 42px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 10px; color: var(--text);
    font-size: 16px; font-family: var(--font-body); outline: none;
    transition: border-color 0.15s; -webkit-appearance: none;
  }
  .auth-input-wrap input:focus { border-color: var(--gold); }
  .auth-input-wrap input::placeholder { color: var(--text3); }
  .auth-input-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--text3); pointer-events: none;
  }
  .auth-input-wrap label {
    display: block; font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .auth-btn {
    width: 100%; padding: 13px; background: var(--gold); color: #000;
    border: none; border-radius: 10px; font-size: var(--text-base); font-weight: 700; letter-spacing: 0.02em;
    cursor: pointer; font-family: var(--font-body); transition: all 0.15s;
    margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .auth-btn:hover { background: #f5c842; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(240,180,41,0.35); }
  .auth-btn:active { transform: translateY(0); }
  .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .auth-divider {
    display: flex; align-items: center; gap: 12px; margin: 20px 0;
    font-size: 12px; color: var(--text3);
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .auth-switch {
    text-align: center; font-size: 13px; color: var(--text2); margin-top: 20px;
  }
  .auth-switch button {
    background: none; border: none; color: var(--gold); font-weight: 600;
    cursor: pointer; font-size: 13px; font-family: var(--font-body);
    padding: 0; text-decoration: underline; -webkit-tap-highlight-color: transparent;
  }
  .auth-error {
    background: var(--red-dim); color: var(--red); border: 1px solid #f8717133;
    border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .auth-success {
    background: var(--green-dim); color: var(--green); border: 1px solid #34d39933;
    border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .auth-hint {
    font-size: 11px; color: var(--text3); margin-top: 4px; padding-left: 2px;
  }
  .auth-features {
    display: flex; flex-direction: column; gap: 8px; margin: 20px 0;
    padding: 16px; background: var(--surface2); border-radius: 10px;
    border: 1px solid var(--border);
  }
  .auth-feature { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text2); }
  .auth-feature-dot { width: 6px; height: 6px; border-radius: 99px; background: var(--gold); flex-shrink: 0; }
  .auth-password-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .auth-password-toggle:hover { color: var(--text2); }
  @media (max-width: 480px) {
    .auth-card { padding: 28px 20px; border-radius: 16px; }
    .auth-title { font-size: 20px; }
  }


  /* ── TRANSACTION TYPE TABS ── */
  .tx-type-tabs { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 20px; }
  .tx-type-tab {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border2);
    background: var(--surface2); cursor: pointer; transition: all 0.15s;
    font-family: var(--font-body); font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--text2);
    -webkit-tap-highlight-color: transparent;
  }
  .tx-type-tab:hover { border-color: var(--border2); background: var(--border); color: var(--text); }
  .tx-type-tab.income.active  { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .tx-type-tab.expense.active { border-color: var(--red);   background: var(--red-dim);   color: var(--red); }
  .tx-type-tab.card.active    { border-color: var(--purple);background: var(--purple-dim);color: var(--purple); }
  .tx-type-tab.transfer.active{ border-color: var(--blue);  background: var(--blue-dim);  color: var(--blue); }
  .tx-save-btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-family: var(--font-body); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center;
    justify-content: center; gap: 8px; margin-top: 6px; letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .tx-save-btn.income  { background: var(--green);  color: #000; }
  .tx-save-btn.expense { background: var(--red);    color: #fff; }
  .tx-save-btn.card    { background: var(--purple); color: #fff; }
  .tx-save-btn.transfer{ background: var(--blue);   color: #000; }
  .tx-save-btn:hover   { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .tx-save-btn:active  { transform: translateY(0); filter: brightness(0.95); }


  /*LP_PLACEHOLDER*/


/* ══ LANDING PAGE ══ */
  .lp { min-height: 100dvh; background: var(--bg); overflow-x: hidden; }

  /* Navbar */
  .lp-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 64px;
    background: rgba(10,10,10,0.8); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .lp-nav-logo { display: flex; align-items: center; gap: 10px; }
  .lp-nav-logo-mark {
    width: 32px; height: 32px; background: var(--gold); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .lp-nav-logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: var(--ls-tight); color: var(--text); }
  .lp-nav-actions { display: flex; align-items: center; gap: 10px; }
  .lp-btn-ghost {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border2);
    background: transparent; color: var(--text); font-family: var(--font-body);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.01em; -webkit-tap-highlight-color: transparent;
  }
  .lp-btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .lp-btn-gold {
    padding: 8px 20px; border-radius: 8px; border: none;
    background: var(--gold); color: #000; font-family: var(--font-body);
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.02em; -webkit-tap-highlight-color: transparent;
  }
  .lp-btn-gold:hover { background: #f5c842; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(240,180,41,0.3); }
  .lp-btn-gold:active { transform: translateY(0); }

  /* Hero */
  .lp-hero {
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 100px 24px 60px; text-align: center; position: relative;
  }
  .lp-hero::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 800px 500px at 50% 0%, #f0b42915 0%, transparent 70%),
      radial-gradient(ellipse 600px 400px at 80% 60%, #34d39908 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 10% 80%, #a78bfa08 0%, transparent 70%);
  }
  .lp-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 99px;
    border: 1px solid #f0b42930; background: #f0b42910;
    font-size: 11px; font-weight: 700; color: var(--gold);
    letter-spacing: var(--ls-wider); text-transform: uppercase;
    margin-bottom: 28px; animation: fadeUp 0.5s ease both;
  }
  .lp-hero-title {
    font-family: var(--font-display); font-size: clamp(42px, 7vw, 80px);
    font-weight: 400; letter-spacing: var(--ls-tight); line-height: 1.05;
    color: var(--text); margin-bottom: 20px; max-width: 800px;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .lp-hero-title em { font-style: italic; color: var(--gold); }
  .lp-hero-sub {
    font-size: clamp(15px, 2vw, 18px); color: var(--text2); max-width: 520px;
    line-height: 1.7; margin-bottom: 40px;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .lp-hero-actions {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.5s 0.3s ease both;
  }
  .lp-hero-cta {
    padding: 14px 32px; border-radius: 10px; border: none;
    background: var(--gold); color: #000; font-family: var(--font-body);
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .lp-hero-cta:hover { background: #f5c842; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(240,180,41,0.35); }
  .lp-hero-cta:active { transform: translateY(0); }
  .lp-hero-secondary {
    padding: 14px 32px; border-radius: 10px; border: 1.5px solid var(--border2);
    background: transparent; color: var(--text); font-family: var(--font-body);
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .lp-hero-secondary:hover { border-color: var(--text2); }

  /* Stats bar */
  .lp-stats {
    display: flex; align-items: center; justify-content: center; gap: 40px;
    flex-wrap: wrap; margin-top: 64px; padding: 28px 40px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    animation: fadeUp 0.5s 0.4s ease both; position: relative; z-index: 1;
  }
  .lp-stat-val { font-family: var(--font-display); font-size: 32px; font-weight: 500; letter-spacing: var(--ls-tight); color: var(--gold); }
  .lp-stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; letter-spacing: 0.03em; }

  /* Features section */
  .lp-section { padding: 96px 40px; max-width: 1200px; margin: 0 auto; }
  .lp-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: var(--ls-widest);
    text-transform: uppercase; color: var(--gold); margin-bottom: 12px;
  }
  .lp-section-title {
    font-family: var(--font-display); font-size: clamp(32px, 4vw, 48px);
    font-weight: 400; letter-spacing: var(--ls-tight); line-height: 1.15;
    color: var(--text); margin-bottom: 16px; max-width: 560px;
  }
  .lp-section-title em { font-style: italic; color: var(--gold); }
  .lp-section-sub { font-size: 15px; color: var(--text2); max-width: 440px; line-height: 1.7; margin-bottom: 56px; }

  .lp-features-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  .lp-feature-card {
    padding: 28px; border-radius: 16px; border: 1px solid var(--border2);
    background: var(--surface); transition: all 0.2s; cursor: default;
    position: relative; overflow: hidden;
  }
  .lp-feature-card::before {
    content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s;
    background: radial-gradient(ellipse 120px 80px at var(--mx,50%) var(--my,50%), #f0b42910, transparent);
    pointer-events: none;
  }
  .lp-feature-card:hover { border-color: #f0b42930; transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
  .lp-feature-card:hover::before { opacity: 1; }
  .lp-feature-icon {
    width: 44px; height: 44px; border-radius: 12px; display: flex;
    align-items: center; justify-content: center; margin-bottom: 16px; flex-shrink: 0;
  }
  .lp-feature-name { font-family: var(--font-display); font-size: 18px; font-weight: 500; margin-bottom: 8px; letter-spacing: var(--ls-tight); }
  .lp-feature-desc { font-size: 13px; color: var(--text2); line-height: 1.65; }

  /* Screens section */
  .lp-screens { padding: 80px 40px; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .lp-screens-inner { max-width: 1100px; margin: 0 auto; }
  .lp-screens-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-top: 48px; }
  .lp-screen-card {
    border-radius: 12px; overflow: hidden; border: 1px solid var(--border2);
    background: var(--surface2); transition: all 0.2s;
  }
  .lp-screen-card:hover { border-color: var(--gold); transform: scale(1.02); }
  .lp-screen-head { height: 8px; display: flex; gap: 4px; align-items: center; padding: 0 8px; background: var(--bg); }
  .lp-screen-dot { width: 5px; height: 5px; border-radius: 99px; }
  .lp-screen-body { padding: 12px; }
  .lp-screen-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); margin-bottom: 8px; }
  .lp-screen-row { height: 6px; border-radius: 4px; background: var(--border2); margin-bottom: 6px; }
  .lp-screen-kpi { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .lp-screen-kpi-box { height: 32px; border-radius: 8px; background: var(--border); }

  /* Pricing / CTA bottom */
  .lp-cta-section {
    padding: 96px 40px; text-align: center;
    background: linear-gradient(180deg, var(--bg) 0%, #0d0c0a 100%);
    position: relative; overflow: hidden;
  }
  .lp-cta-section::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 600px 400px at 50% 100%, #f0b42912 0%, transparent 70%);
  }
  .lp-cta-title { font-family: var(--font-display); font-size: clamp(36px,5vw,60px); font-weight: 400; letter-spacing: var(--ls-tight); margin-bottom: 16px; }
  .lp-cta-title em { font-style: italic; color: var(--gold); }
  .lp-cta-sub { font-size: 16px; color: var(--text2); max-width: 400px; margin: 0 auto 40px; line-height: 1.7; }

  /* Footer */
  .lp-footer {
    padding: 24px 40px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .lp-footer-copy { font-size: 12px; color: var(--text3); }

  @media (max-width: 900px) {
    .lp-nav { padding: 0 20px; }
    .lp-features-grid { grid-template-columns: 1fr 1fr; }
    .lp-screens-grid { grid-template-columns: 1fr 1fr; }
    .lp-section { padding: 64px 20px; }
    .lp-screens { padding: 60px 20px; }
    .lp-cta-section { padding: 64px 20px; }
    .lp-footer { padding: 20px; }
    .lp-stats { gap: 24px; padding: 20px; }
  }
  @media (max-width: 600px) {
    .lp-features-grid { grid-template-columns: 1fr; }
    .lp-screens-grid { grid-template-columns: 1fr 1fr; }
    .lp-nav-logo-text { font-size: 16px; }
  }


  /* ══ STRIPE / PLANS ══ */

    position: fixed; inset: 0; z-index: 200;

  .plan-badge {

  .plan-badge.free { background: var(--border); color: var(--text2); }
  .plan-badge.pro  { background: #f0b42920; color: var(--gold); border: 1px solid #f0b42940; }

  .plan-price {
    font-family: var(--font-display); letter-spacing: var(--ls-tight);
    margin-bottom: 4px; line-height: 1;
  }
  .plan-price-val { font-size: 40px; font-weight: 500; }
  .plan-price-period { font-size: 14px; color: var(--text2); font-style: italic; }
  .plan-price-annual { font-size: 12px; color: var(--green); margin-bottom: 20px; margin-top: 4px; }

  .plan-features { list-style: none; padding: 0; margin: 0 0 24px; display: flex; flex-direction: column; gap: 10px; }
  .plan-feature { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text2); }
  .plan-feature.included { color: var(--text); }
  .plan-feature-icon { flex-shrink: 0; margin-top: 1px; }

  .plan-cta {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    font-family: var(--font-body); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .plan-cta.free { background: var(--surface); border: 1.5px solid var(--border2); color: var(--text2); }
  .plan-cta.pro  { background: var(--gold); color: #000; }
  .plan-cta.pro:hover { background: #f5c842; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,180,41,0.35); }
  .plan-cta:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  .plan-current-badge {
    position: absolute; top: 12px; right: 12px;
    background: var(--green-dim); color: var(--green);
    border: 1px solid #34d39930; border-radius: 6px;
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    letter-spacing: 0.06em; text-transform: uppercase;

    border-radius: 99px; background: rgba(255,255,255,0.05);

  }

  /* ACCOUNT CARD */
  .acc-card { border-radius: var(--radius); border: 1px solid var(--border); padding: 18px; background: var(--surface); }
  .acc-balance { font-family: var(--font-mono); font-size: 22px; font-weight: 600; letter-spacing: var(--ls-tight); margin: 8px 0; }

  /* METRIC ROW */
  .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .metric-row:last-child { border-bottom: none; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select { width: auto; flex: 1; min-width: 140px; }

  /* GOAL CARD */
  .goal-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; background: var(--surface); }

  /* TAB BAR */
  .tab-bar { display: flex; gap: 2px; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 20px; }
  .tab { padding: 7px 16px; border-radius: 8px; font-size: var(--text-base); font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text2); font-family: var(--font-body); letter-spacing: 0.005em; transition: all 0.15s; }
  .tab.active { background: var(--surface); color: var(--gold); box-shadow: 0 1px 6px rgba(0,0,0,0.4); }

  /* CASH FLOW CHART */
  .cf-legend { display: flex; gap: 16px; margin-bottom: 12px; }
  .cf-dot { width: 8px; height: 8px; border-radius: 99px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.4s ease both; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .pulse { animation: pulse 2s infinite; }

  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 RESPONSIVE \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */

  /* Tablet: colapsar sidebar */
  @media (max-width: 1024px) {
    .sidebar { width: 60px; min-width: 60px; }
    .sidebar .logo-text, .sidebar .logo-sub,
    .sidebar .nav-item span:not(.nav-dot),
    .sidebar .sidebar-bottom .user-pill > div:last-child { display: none; }
  }

  /* \u2550\u2550 MOBILE \u2550\u2550 */
  @media (max-width: 768px) {
    html { -webkit-text-size-adjust: 100%; touch-action: manipulation; }
    *, *::before, *::after { box-sizing: border-box; }

    /* \u2500\u2500 Layout base \u2500\u2500 */
    .app { flex-direction: column; overflow: hidden; height: 100dvh; }
    .main { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar { display: none !important; }

    /* \u2500\u2500 Topbar \u2500\u2500 */
    .topbar {
      padding: 10px 16px; gap: 8px; min-height: 52px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .topbar-title { font-size: 16px; font-weight: 700; }
    .topbar-sub { display: none; }
    .topbar-right-desktop { display: none; }

    /* \u2500\u2500 Content scroll \u2500\u2500 */
    .content {
      padding: 12px 12px 90px;
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* \u2500\u2500 Se\xE7\xF5es \u2500\u2500 */
    .section-head { gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .section-title { font-size: 20px; }

    /* \u2500\u2500 Cards \u2500\u2500 */
    .card { padding: 12px; border-radius: 12px; }
    .card-title { font-size: 13px; }

    /* \u2500\u2500 KPIs \u2500\u2500 */
    .kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 8px; }
    .kpi { padding: 10px 12px; border-radius: 10px; }
    .kpi-value { font-size: 16px; }
    .kpi-label { font-size: 9px; }
    .kpi-icon { display: none; }

    /* \u2500\u2500 Grids \u2192 1 coluna \u2500\u2500 */
    .grid-2, .grid-3, .grid-65-35, .grid-35-65,
    .auto-grid-260, .auto-grid-280, .auto-grid-320 { grid-template-columns: 1fr !important; }
    [style*="grid-template-columns: 1fr 1fr"],
    [style*="grid-template-columns: 1fr 1fr 1fr"],
    [style*="repeat(3, 1fr)"] { grid-template-columns: 1fr 1fr !important; }
    [style*="minmax(320px"], [style*="minmax(280px"], [style*="minmax(260px"] { grid-template-columns: 1fr !important; }

    /* \u2500\u2500 Tabelas scroll \u2500\u2500 */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
    table { min-width: 480px; }
    thead th, tbody td { padding: 8px 10px; font-size: 11px; }

    /* \u2500\u2500 Filtros \u2500\u2500 */
    .filter-bar { gap: 6px; flex-wrap: wrap; }
    .filter-bar input, .filter-bar select { min-width: 0 !important; width: 100% !important; flex: 1 1 calc(50% - 6px); box-sizing: border-box; font-size: 13px; }

    /* \u2500\u2500 Inputs e selects \u2500\u2500 */
    input, select, textarea { font-size: 16px !important; } /* prevent iOS zoom */

    /* \u2500\u2500 Tab bar \u2500\u2500 */
    .tab-bar { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
    .tab { white-space: nowrap; font-size: 12px; padding: 6px 12px; }

    /* \u2500\u2500 Donut \u2500\u2500 */
    .donut-wrap { flex-direction: column; align-items: flex-start; }

    /* \u2500\u2500 Alerts \u2500\u2500 */
    .alert-bar { padding: 8px 12px; font-size: 11px; }

    /* \u2500\u2500 Bottom nav \u2014 glass pill \u2500\u2500 */
    .bottom-nav {
      display: flex !important;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 600;
      height: 72px;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-top: 1px solid rgba(255,255,255,0.08);
      align-items: center;
      padding: 0 6px env(safe-area-inset-bottom, 4px);
      gap: 2px;
    }
    .bn-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; border: none; background: none;
      cursor: pointer; color: var(--text3);
      font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      font-family: var(--font-body); transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      padding: 6px 2px; border-radius: 10px; min-width: 0;
    }
    .bn-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: center; }
    .bn-item:active { transform: scale(0.9); }
    .bn-item.active { color: var(--gold); }
    .bn-item.active svg { filter: drop-shadow(0 0 5px rgba(240,180,41,0.6)); }
    .bn-fab-wrap {
      flex: 0 0 60px; display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .bn-fab {
      width: 52px; height: 52px; background: var(--gold); border-radius: 99px;
      display: flex; align-items: center; justify-content: center; color: #000;
      box-shadow: 0 4px 22px rgba(240,180,41,0.65), 0 0 0 3px rgba(240,180,41,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .bn-fab:active { transform: scale(0.88); }

    /* \u2500\u2500 Modais: bottom sheet acima da nav \u2500\u2500 */
    .modal-bg {
      align-items: flex-end; padding: 0;
      padding-bottom: 72px;
    }
    .modal {
      border-radius: 20px 20px 0 0;
      max-height: calc(88dvh - 72px);
      border-left: none; border-right: none; border-bottom: none;
      display: flex; flex-direction: column;
    }
    .modal-header { padding: 14px 16px; flex-shrink: 0; }
    .modal-title { font-size: 16px; }
    .modal-body { padding: 12px 16px 16px; overflow-y: auto; flex: 1; }

    /* \u2500\u2500 Drawer \u2500\u2500 */
    .drawer-overlay { position: fixed; inset: 0; z-index: 700; display: flex; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); }
    .drawer-panel { width: 260px; max-width: 82vw; height: 100%; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; animation: drawerSlide 0.22s ease; }
    .drawer-dismiss { flex: 1; }

    /* \u2500\u2500 Menu button \u2500\u2500 */
    .menu-btn { display: flex !important; align-items: center; justify-content: center; padding: 8px; border-radius: 8px; border: none; background: none; color: var(--text); cursor: pointer; -webkit-tap-highlight-color: transparent; }

    /* \u2500\u2500 Misc \u2500\u2500 */
    .qe-fab-topbar { display: none !important; }
    .qe-toast { left: 12px; right: 12px; bottom: 80px; }
  }

  /* \u2500\u2500 Telas muito pequenas (\u2264390px / iPhone SE) \u2500\u2500 */
  @media (max-width: 390px) {
    .content { padding: 10px 10px 88px; }
    .topbar { padding: 8px 12px; }
    .kpi-value { font-size: 14px; }
    .kpi { padding: 8px 10px; }
    .card { padding: 10px; }
    .bn-item { font-size: 8px; }
    .bn-fab { width: 48px; height: 48px; }
  }

  @keyframes drawerSlide { from { transform: translateX(-100%); } to { transform: translateX(0); } }


  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 AUTH SCREEN \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  .auth-bg {
    min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); padding: 20px; position: relative; overflow: hidden;
  }
  .auth-bg::before {
    content: ''; position: absolute; width: 600px; height: 600px;
    background: radial-gradient(circle, #f0b42912 0%, transparent 70%);
    top: -200px; right: -200px; pointer-events: none;
  }
  .auth-bg::after {
    content: ''; position: absolute; width: 400px; height: 400px;
    background: radial-gradient(circle, #34d39908 0%, transparent 70%);
    bottom: -100px; left: -100px; pointer-events: none;
  }
  .auth-card {
    width: 100%; max-width: 420px; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 20px;
    padding: 40px 36px; position: relative; z-index: 1;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.5s ease both;
  }
  .auth-logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
  }
  .auth-logo-mark {
    width: 40px; height: 40px; background: var(--gold); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .auth-logo-text { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: var(--ls-tight); }
  .auth-logo-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .auth-title { font-family: var(--font-display); font-size: 34px; font-weight: 400; letter-spacing: var(--ls-tight); margin-bottom: 6px; line-height: var(--lh-tight); font-style: italic; }
  .auth-sub { font-size: var(--text-base); color: var(--text2); margin-bottom: 28px; line-height: var(--lh-normal); }
  .auth-input-wrap { position: relative; margin-bottom: 14px; }
  .auth-input-wrap input {
    width: 100%; padding: 12px 14px 12px 42px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 10px; color: var(--text);
    font-size: 16px; font-family: var(--font-body); outline: none;
    transition: border-color 0.15s; -webkit-appearance: none;
  }
  .auth-input-wrap input:focus { border-color: var(--gold); }
  .auth-input-wrap input::placeholder { color: var(--text3); }
  .auth-input-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--text3); pointer-events: none;
  }
  .auth-input-wrap label {
    display: block; font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .auth-btn {
    width: 100%; padding: 13px; background: var(--gold); color: #000;
    border: none; border-radius: 10px; font-size: var(--text-base); font-weight: 700; letter-spacing: 0.02em;
    cursor: pointer; font-family: var(--font-body); transition: all 0.15s;
    margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .auth-btn:hover { background: #f5c842; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(240,180,41,0.35); }
  .auth-btn:active { transform: translateY(0); }
  .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .auth-divider {
    display: flex; align-items: center; gap: 12px; margin: 20px 0;
    font-size: 12px; color: var(--text3);
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .auth-switch {
    text-align: center; font-size: 13px; color: var(--text2); margin-top: 20px;
  }
  .auth-switch button {
    background: none; border: none; color: var(--gold); font-weight: 600;
    cursor: pointer; font-size: 13px; font-family: var(--font-body);
    padding: 0; text-decoration: underline; -webkit-tap-highlight-color: transparent;
  }
  .auth-error {
    background: var(--red-dim); color: var(--red); border: 1px solid #f8717133;
    border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .auth-success {
    background: var(--green-dim); color: var(--green); border: 1px solid #34d39933;
    border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .auth-hint {
    font-size: 11px; color: var(--text3); margin-top: 4px; padding-left: 2px;
  }
  .auth-features {
    display: flex; flex-direction: column; gap: 8px; margin: 20px 0;
    padding: 16px; background: var(--surface2); border-radius: 10px;
    border: 1px solid var(--border);
  }
  .auth-feature { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text2); }
  .auth-feature-dot { width: 6px; height: 6px; border-radius: 99px; background: var(--gold); flex-shrink: 0; }
  .auth-password-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .auth-password-toggle:hover { color: var(--text2); }
  @media (max-width: 480px) {
    .auth-card { padding: 28px 20px; border-radius: 16px; }
    .auth-title { font-size: 20px; }
  }


  /* \u2500\u2500 TRANSACTION TYPE TABS \u2500\u2500 */
  .tx-type-tabs { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 20px; }
  .tx-type-tab {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border2);
    background: var(--surface2); cursor: pointer; transition: all 0.15s;
    font-family: var(--font-body); font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--text2);
    -webkit-tap-highlight-color: transparent;
  }
  .tx-type-tab:hover { border-color: var(--border2); background: var(--border); color: var(--text); }
  .tx-type-tab.income.active  { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .tx-type-tab.expense.active { border-color: var(--red);   background: var(--red-dim);   color: var(--red); }
  .tx-type-tab.card.active    { border-color: var(--purple);background: var(--purple-dim);color: var(--purple); }
  .tx-type-tab.transfer.active{ border-color: var(--blue);  background: var(--blue-dim);  color: var(--blue); }
  .tx-save-btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-family: var(--font-body); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center;
    justify-content: center; gap: 8px; margin-top: 6px; letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .tx-save-btn.income  { background: var(--green);  color: #000; }
  .tx-save-btn.expense { background: var(--red);    color: #fff; }
  .tx-save-btn.card    { background: var(--purple); color: #fff; }
  .tx-save-btn.transfer{ background: var(--blue);   color: #000; }
  .tx-save-btn:hover   { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .tx-save-btn:active  { transform: translateY(0); filter: brightness(0.95); }


  /*LP_PLACEHOLDER*/


/* \u2550\u2550 LANDING PAGE \u2550\u2550 */
  .lp { min-height: 100dvh; background: var(--bg); overflow-x: hidden; }

  /* Navbar */
  .lp-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 64px;
    background: rgba(10,10,10,0.8); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .lp-nav-logo { display: flex; align-items: center; gap: 10px; }
  .lp-nav-logo-mark {
    width: 32px; height: 32px; background: var(--gold); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .lp-nav-logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: var(--ls-tight); color: var(--text); }
  .lp-nav-actions { display: flex; align-items: center; gap: 10px; }
  .lp-btn-ghost {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border2);
    background: transparent; color: var(--text); font-family: var(--font-body);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.01em; -webkit-tap-highlight-color: transparent;
  }
  .lp-btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .lp-btn-gold {
    padding: 8px 20px; border-radius: 8px; border: none;
    background: var(--gold); color: #000; font-family: var(--font-body);
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.02em; -webkit-tap-highlight-color: transparent;
  }
  .lp-btn-gold:hover { background: #f5c842; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(240,180,41,0.3); }
  .lp-btn-gold:active { transform: translateY(0); }

  /* Hero */
  .lp-hero {
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 100px 24px 60px; text-align: center; position: relative;
  }
  .lp-hero::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 800px 500px at 50% 0%, #f0b42915 0%, transparent 70%),
      radial-gradient(ellipse 600px 400px at 80% 60%, #34d39908 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 10% 80%, #a78bfa08 0%, transparent 70%);
  }
  .lp-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 99px;
    border: 1px solid #f0b42930; background: #f0b42910;
    font-size: 11px; font-weight: 700; color: var(--gold);
    letter-spacing: var(--ls-wider); text-transform: uppercase;
    margin-bottom: 28px; animation: fadeUp 0.5s ease both;
  }
  .lp-hero-title {
    font-family: var(--font-display); font-size: clamp(42px, 7vw, 80px);
    font-weight: 400; letter-spacing: var(--ls-tight); line-height: 1.05;
    color: var(--text); margin-bottom: 20px; max-width: 800px;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .lp-hero-title em { font-style: italic; color: var(--gold); }
  .lp-hero-sub {
    font-size: clamp(15px, 2vw, 18px); color: var(--text2); max-width: 520px;
    line-height: 1.7; margin-bottom: 40px;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .lp-hero-actions {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.5s 0.3s ease both;
  }
  .lp-hero-cta {
    padding: 14px 32px; border-radius: 10px; border: none;
    background: var(--gold); color: #000; font-family: var(--font-body);
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .lp-hero-cta:hover { background: #f5c842; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(240,180,41,0.35); }
  .lp-hero-cta:active { transform: translateY(0); }
  .lp-hero-secondary {
    padding: 14px 32px; border-radius: 10px; border: 1.5px solid var(--border2);
    background: transparent; color: var(--text); font-family: var(--font-body);
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .lp-hero-secondary:hover { border-color: var(--text2); }

  /* Stats bar */
  .lp-stats {
    display: flex; align-items: center; justify-content: center; gap: 40px;
    flex-wrap: wrap; margin-top: 64px; padding: 28px 40px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    animation: fadeUp 0.5s 0.4s ease both; position: relative; z-index: 1;
  }

  /* Features section */

  .lp-features-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  .lp-feature-card {

  }

    pointer-events: none;
  }

  .lp-feature-icon {

    align-items: center; justify-content: center; margin-bottom: 16px; flex-shrink: 0;

  .lp-feature-name { font-family: var(--font-display); font-size: 18px; font-weight: 500; margin-bottom: 8px; letter-spacing: var(--ls-tight); }
  .lp-feature-desc { font-size: 13px; color: var(--text2); line-height: 1.65; }

  /* Screens section */
  .lp-screens { padding: 80px 40px; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .lp-screens-inner { max-width: 1100px; margin: 0 auto; }
  .lp-screens-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-top: 48px; }
  .lp-screen-card {
    border-radius: 12px; overflow: hidden; border: 1px solid var(--border2);
    background: var(--surface2); transition: all 0.2s;
  }
  .lp-screen-card:hover { border-color: var(--gold); transform: scale(1.02); }
  .lp-screen-head { height: 8px; display: flex; gap: 4px; align-items: center; padding: 0 8px; background: var(--bg); }
  .lp-screen-dot { width: 5px; height: 5px; border-radius: 99px; }
  .lp-screen-body { padding: 12px; }
  .lp-screen-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); margin-bottom: 8px; }
  .lp-screen-row { height: 6px; border-radius: 4px; background: var(--border2); margin-bottom: 6px; }
  .lp-screen-kpi { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .lp-screen-kpi-box { height: 32px; border-radius: 8px; background: var(--border); }

  /* Pricing / CTA bottom */
  .lp-cta-section {
    padding: 96px 40px; text-align: center;
    background: linear-gradient(180deg, var(--bg) 0%, #0d0c0a 100%);
    position: relative; overflow: hidden;
  }
  .lp-cta-section::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 600px 400px at 50% 100%, #f0b42912 0%, transparent 70%);
  }
  .lp-cta-title { font-family: var(--font-display); font-size: clamp(36px,5vw,60px); font-weight: 400; letter-spacing: var(--ls-tight); margin-bottom: 16px; }
  .lp-cta-title em { font-style: italic; color: var(--gold); }
  .lp-cta-sub { font-size: 16px; color: var(--text2); max-width: 400px; margin: 0 auto 40px; line-height: 1.7; }

  .lp-footer {
    padding: 24px 40px; border-top: 1px solid var(--border);

  .lp-footer-copy { font-size: 12px; color: var(--text3); }

  @media (max-width: 900px) {

    .lp-features-grid { grid-template-columns: 1fr 1fr; }
    .lp-screens-grid { grid-template-columns: 1fr 1fr; }
    .lp-section { padding: 64px 20px; }
    .lp-screens { padding: 60px 20px; }
    .lp-cta-section { padding: 64px 20px; }
    .lp-footer { padding: 20px; }
    .lp-stats { gap: 24px; padding: 20px; }

    .lp-features-grid { grid-template-columns: 1fr; }
    .lp-screens-grid { grid-template-columns: 1fr 1fr; }

    position: fixed; inset: 0; z-index: 200;

  .plans-card {
    background: var(--surface); border: 1px solid var(--border2);

    animation: fadeUp 0.35s ease both;

  .plans-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--surface2); border: none; border-radius: 8px;

    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;

  .plans-toggle {

  .plans-toggle-btn {
    padding: 7px 20px; border-radius: 8px; border: none;
    font-family: var(--font-body); font-size: 13px; font-weight: 600;

  .plans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .plan-box {
    border: 1.5px solid var(--border2); border-radius: 16px;

  }
  .plan-box.free { background: var(--surface2); }
  .plan-box.pro  {
    background: linear-gradient(135deg, #1a1508 0%, #0d0c0a 100%);
    border-color: #f0b42940;
  }
  .plan-box.pro::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 200px 120px at 80% 20%, #f0b42912, transparent);
  }
  .plan-box:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }

  .plan-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 99px; font-size: 10px;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .plan-badge.free { background: var(--border); color: var(--text2); }
  .plan-badge.pro  { background: #f0b42920; color: var(--gold); border: 1px solid #f0b42940; }

    width: 100%; padding: 12px; border-radius: 10px; border: none;
